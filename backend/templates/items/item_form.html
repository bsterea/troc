{% extends "base.html" %}

{% block content %}

<!--
    Item create/edit form.

    Supports optional photo upload.
-->

<h2>Create / Edit Item</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <p>
        <label for="photo">
            Item Photo
        </label>
        <br>
        <input
            type="file"
            name="photo"
            id="photo"
            accept="image/*"
        >
    </p>

    <button type="submit">
        Save Item
    </button>
</form>

<p>
    <a href="/items/">
        Back to Items
    </a>
</p>

{% endblock %}

<!-- END OF FILE -->
