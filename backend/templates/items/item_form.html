{% extends "base.html" %}

{% block content %}

<!--
    Item form page.

    This page allows a logged-in user to create or edit an item
    and optionally upload one photo.
-->

<h2>Item Form</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <p>
        <label for="id_photo">Photo</label><br>
        <input type="file" name="photo" id="id_photo" accept="image/*">
    </p>

    <button type="submit">Save Item</button>
</form>

<p>
    <a href="/items/">Back to Items</a>
</p>

{% endblock %}

<!-- END OF FILE -->
