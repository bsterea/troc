{% extends "base.html" %}

{% block content %}

<h2>Create Item</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <p>
        <label>Photo</label><br>
        <input type="file" name="photo">
    </p>

    <button type="submit">Save Item</button>
</form>

<p>
    <a href="/items/">Back to Items</a>
</p>

{% endblock %}
