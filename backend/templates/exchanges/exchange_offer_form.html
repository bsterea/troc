{% extends "base.html" %}

{% block content %}

<!--
    Exchange offer creation page.

    This page creates the main exchange offer.
    Items are added separately after the offer is created.
-->

<h2>Create Exchange Offer</h2>

    {% csrf_token %}

    <!-- Render the exchange offer form fields. -->

</form>

<p>
    <a href="/exchanges/">Back to Exchanges</a>
</p>

{% endblock %}
