{% extends "base.html" %}

{% block content %}

<!--
    Item delete confirmation page.

    This page asks the owner to confirm item deletion.
-->

<h2>Delete Item</h2>

<p>
    Are you sure you want to delete this item?
</p>

<p>
    <strong>{{ item.title }}</strong>
</p>

<form method="post">
    {% csrf_token %}

    <button type="submit">Yes, delete</button>
</form>

<p>
    <a href="/items/{{ item.id }}/">Cancel</a>
</p>

{% endblock %}

<!-- END OF FILE -->
