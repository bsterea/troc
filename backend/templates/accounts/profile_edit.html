{% extends "base.html" %}

{% block content %}

<!--
    User profile edit page.

    This page allows the logged-in user to update
    personal profile information and location data.
-->

<h2>Edit Profile</h2>

<form method="post">
    {% csrf_token %}

    <!-- Render the Django profile update form fields. -->
    {{ form.as_p }}

    <button type="submit">Save Changes</button>
</form>

<p>
    <a href="/accounts/profile/">Back to Profile</a>
</p>

{% endblock %}

<!-- END OF FILE -->
